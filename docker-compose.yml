services:
  # L'interface de l'IA (Expert Spark)
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    network_mode: "host"
    environment:
      - OPENAI_API_BASE=http://127.0.0.1:4000/v1
      - OPENAI_API_KEY=sk-votre-cle-api-ici
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Le traducteur pour tes clés API (Kimi / GPT-4)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    network_mode: "host"
    volumes:
      - ./config:/app/config
    command: ["--config", "/app/config/config.yaml", "--port", "4000"]
    restart: unless-stopped

  # Le vigile (Port 80) - Version GitHub pour éviter le timeout
  caddy:
    # LE BON MAGASIN : L'image officielle Caddy sur GitHub
    image: ghcr.io/caddyserver/caddy:latest
    container_name: caddy
    network_mode: "host"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    restart: unless-stopped
